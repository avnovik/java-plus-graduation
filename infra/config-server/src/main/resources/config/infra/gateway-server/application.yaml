spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      # Gateway для своей работы должен использовать Discovery Service.
      discovery:
        locator:
          # Автоматическую генерацию маршрутов из Discovery отключаем,
          # маршруты задаём явно в spring.cloud.gateway.routes.
          enabled: false
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**

        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**,/users/*/events/*/requests/**

        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/events/**,/admin/events/**,/users/*/events/**,/compilations/**,/admin/compilations/**

        - id: category-service
          uri: lb://category-service
          predicates:
            - Path=/categories/**,/admin/categories/**

        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/admin/comments/**,/events/*/comments/**,/comments/**,/users/*/comments/**,/users/*/events/*/comments/**


server:
  port: 8080

logging:
  level:
    # 1-2 строки на каждый входящий HTTP-запрос в Gateway (метод + путь + статус).
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info

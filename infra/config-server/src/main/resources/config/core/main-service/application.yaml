server:
  port: 0

spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:6542/ewmdb
    username: ewmdb
    password: ewmdb

logging:
  level:
    ru.practicum: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

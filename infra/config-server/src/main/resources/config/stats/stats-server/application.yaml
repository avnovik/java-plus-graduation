server:
  port: 0

spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:6541/statsdb
    username: statsdb
    password: ${STATS_DB_PASSWORD:statsdb}

logging:
  level:
    ru.practicum: INFO
    org.springframework.jdbc.datasource.init: INFO
    org.springframework.boot.sql.init: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 0

grpc:
  server:
    port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:6541/statsdb
    username: statsdb
    password: ${STATS_DB_PASSWORD:statsdb}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

analyzer:
  kafka:
    bootstrap-servers: localhost:9092
    user-actions-group-id: analyzer-user-actions
    events-similarity-group-id: analyzer-events-similarity
    poll-timeout-ms: 500
    topics:
      user-actions: stats.user-actions.v1
      events-similarity: stats.events-similarity.v1

logging:
  level:
    ru.yandex.practicum: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

aggregator:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: aggregator
      topics:
        user-actions: stats.user-actions.v1
    producer:
      topics:
        events-similarity: stats.events-similarity.v1

logging:
  level:
    ru.practicum: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

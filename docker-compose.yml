services:
  stats-db:
    image: postgres:16.1
    container_name: stats-db
    ports:
      - "6541:5432"
    environment:
      - POSTGRES_DB=statsdb
      - POSTGRES_USER=statsdb
      - POSTGRES_PASSWORD=${STATS_DB_PASSWORD:-statsdb}
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10

  ewm-db:
    image: postgres:16.1
    container_name: ewm-db
    ports:
      - "6542:5432"
    environment:
      - POSTGRES_DB=ewmdb
      - POSTGRES_USER=ewmdb
      - POSTGRES_PASSWORD=${EWM_DB_PASSWORD:-ewmdb}
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10

  db-init:
    image: postgres:16.1
    container_name: db-init
    depends_on:
      - ewm-db
    environment:
      PGPASSWORD: ${EWM_DB_PASSWORD:-ewmdb}
    entrypoint:
      - bash
      - -c
      - >
        set -e;
        until pg_isready -h ewm-db -U ewmdb -d postgres; do
          echo "waiting for postgres...";
          sleep 1;
        done;
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database userdb owner ewmdb";
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database eventdb owner ewmdb";
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database requestdb owner ewmdb";
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database commentdb owner ewmdb";
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database categorydb owner ewmdb";
    restart: "no"

  kafka:
    image: confluentinc/confluent-local:7.4.3
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      CLUSTER_ID: K0EA9p0yEe6MkAAAAkKsEg

  kafka-init-topics:
    image: confluentinc/confluent-local:7.4.3
    container_name: kafka-init-topics
    depends_on:
      - kafka
    command: >
      bash -c "
      kafka-topics --create --topic stats.user-actions.v1
      --partitions 1 --replication-factor 1 --if-not-exists
      --bootstrap-server kafka:29092 &&
      kafka-topics --create --topic stats.events-similarity.v1
      --partitions 1 --replication-factor 1 --if-not-exists
      --bootstrap-server kafka:29092"
    init: true
    restart: "no"
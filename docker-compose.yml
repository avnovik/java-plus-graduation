services:
  stats-db:
    image: postgres:16.1
    container_name: stats-db
    ports:
      - "6541:5432"
    environment:
      - POSTGRES_DB=statsdb
      - POSTGRES_USER=statsdb
      - POSTGRES_PASSWORD=${STATS_DB_PASSWORD:-statsdb}
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10

  ewm-db:
    image: postgres:16.1
    container_name: ewm-db
    ports:
      - "6542:5432"
    environment:
      - POSTGRES_DB=ewmdb
      - POSTGRES_USER=ewmdb
      - POSTGRES_PASSWORD=${EWM_DB_PASSWORD:-ewmdb}
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10

  db-init:
    image: postgres:16.1
    container_name: db-init
    depends_on:
      - ewm-db
    environment:
      PGPASSWORD: ${EWM_DB_PASSWORD:-ewmdb}
    entrypoint:
      - bash
      - -c
      - >
        set -e;
        until pg_isready -h ewm-db -U ewmdb -d postgres; do
          echo "waiting for postgres...";
          sleep 1;
        done;
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database userdb owner ewmdb";
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database eventdb owner ewmdb";
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database requestdb owner ewmdb";
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database commentdb owner ewmdb";
        psql -h ewm-db -U ewmdb -d postgres -v ON_ERROR_STOP=1 -c "create database categorydb owner ewmdb";
    restart: "no"